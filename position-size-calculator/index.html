<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Position Size Calculator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0a0e1a;
  color: #e0e6ed;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.container {
  background: #111827;
  border-radius: 16px;
  padding: 32px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  border: 1px solid #1f2937;
}
h1 {
  font-size: 1.5rem;
  margin-bottom: 24px;
  color: #fbbf24;
  text-align: center;
}
.input-group {
  margin-bottom: 16px;
}
label {
  display: block;
  font-size: 0.875rem;
  color: #9ca3af;
  margin-bottom: 6px;
}
input, select {
  width: 100%;
  padding: 12px 14px;
  background: #1f2937;
  border: 1px solid #374151;
  border-radius: 8px;
  color: #e0e6ed;
  font-size: 1rem;
  transition: border-color 0.2s;
}
input:focus, select:focus {
  outline: none;
  border-color: #fbbf24;
}
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
button {
  width: 100%;
  padding: 14px;
  background: #fbbf24;
  color: #0a0e1a;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.2s;
}
button:hover { opacity: 0.9; }
.results {
  margin-top: 24px;
  padding: 20px;
  background: #0f172a;
  border-radius: 12px;
  border: 1px solid #1f2937;
  display: none;
}
.results.active { display: block; }
.result-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #1f2937;
}
.result-row:last-child { border-bottom: none; }
.result-label { color: #9ca3af; font-size: 0.875rem; }
.result-value { font-weight: 600; color: #fbbf24; }
.result-value.red { color: #ef4444; }
.result-value.green { color: #22c55e; }
.footer {
  text-align: center;
  margin-top: 16px;
  font-size: 0.75rem;
  color: #6b7280;
}
</style>
</head>
<body>
<div class="container">
  <h1>Position Size Calculator</h1>
  
  <div class="row">
    <div class="input-group">
      <label>Account Balance ($)</label>
      <input type="number" id="balance" value="10000" step="100">
    </div>
    <div class="input-group">
      <label>Risk per Trade (%)</label>
      <input type="number" id="riskPercent" value="1" step="0.1" min="0.1" max="100">
    </div>
  </div>
  
  <div class="row">
    <div class="input-group">
      <label>Entry Price ($)</label>
      <input type="number" id="entry" value="45000" step="0.01">
    </div>
    <div class="input-group">
      <label>Stop Loss ($)</label>
      <input type="number" id="stopLoss" value="44000" step="0.01">
    </div>
  </div>
  
  <div class="row">
    <div class="input-group">
      <label>Take Profit ($)</label>
      <input type="number" id="takeProfit" value="47000" step="0.01">
    </div>
    <div class="input-group">
      <label>Leverage</label>
      <input type="number" id="leverage" value="1" step="1" min="1" max="125">
    </div>
  </div>
  
  <div class="input-group">
    <label>Market</label>
    <select id="market">
      <option value="crypto">Crypto</option>
      <option value="forex">Forex</option>
      <option value="stocks">Stocks</option>
    </select>
  </div>
  
  <button onclick="calculate()">Calculate Position</button>
  
  <div class="results" id="results">
    <div class="result-row">
      <span class="result-label">Position Size</span>
      <span class="result-value" id="resSize">-</span>
    </div>
    <div class="result-row">
      <span class="result-label">Risk Amount</span>
      <span class="result-value red" id="resRisk">-</span>
    </div>
    <div class="result-row">
      <span class="result-label">Notional Value</span>
      <span class="result-value" id="resNotional">-</span>
    </div>
    <div class="result-row">
      <span class="result-label">Risk/Reward</span>
      <span class="result-value green" id="resRR">-</span>
    </div>
    <div class="result-row">
      <span class="result-label">Potential Profit</span>
      <span class="result-value green" id="resProfit">-</span>
    </div>
    <div class="result-row">
      <span class="result-label">Breakeven Win Rate</span>
      <span class="result-value" id="resBreakeven">-</span>
    </div>
  </div>
  
  <div class="footer">Built for traders. No data leaves your browser.</div>
</div>

<script>
function calculate() {
  const balance = parseFloat(document.getElementById('balance').value);
  const riskPercent = parseFloat(document.getElementById('riskPercent').value);
  const entry = parseFloat(document.getElementById('entry').value);
  const stopLoss = parseFloat(document.getElementById('stopLoss').value);
  const takeProfit = parseFloat(document.getElementById('takeProfit').value);
  const leverage = parseFloat(document.getElementById('leverage').value);
  
  if (!balance || !entry || !stopLoss || !takeProfit) return;
  
  const riskAmount = balance * (riskPercent / 100);
  const priceDiff = Math.abs(entry - stopLoss);
  const positionSize = (riskAmount / priceDiff) * entry;
  const notional = positionSize * leverage;
  const tpDiff = Math.abs(takeProfit - entry);
  const reward = (tpDiff / priceDiff) * riskAmount;
  const rr = (tpDiff / priceDiff).toFixed(2);
  const breakeven = (1 / (1 + parseFloat(rr))) * 100;
  
  document.getElementById('resSize').textContent = positionSize.toFixed(6) + ' units';
  document.getElementById('resRisk').textContent = '$' + riskAmount.toFixed(2);
  document.getElementById('resNotional').textContent = '$' + notional.toFixed(2);
  document.getElementById('resRR').textContent = '1:' + rr;
  document.getElementById('resProfit').textContent = '$' + reward.toFixed(2);
  document.getElementById('resBreakeven').textContent = breakeven.toFixed(1) + '%';
  document.getElementById('results').classList.add('active');
}

document.querySelectorAll('input').forEach(input => {
  input.addEventListener('keypress', (e) => { if (e.key === 'Enter') calculate(); });
});
</script>
</body>
</html>
